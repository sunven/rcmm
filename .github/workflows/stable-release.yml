# =============================================================================
# Stable Release Workflow
# =============================================================================
# 推送 vX.Y.Z tag 时构建正式版 DMG，并创建普通 GitHub Release。
# 这条链路不做 Developer ID signing，也不做 notarization；产物是 ad-hoc
# signed 的 DMG。首次运行时用户可能需要手动放行 quarantine。
# =============================================================================

name: Stable Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Release Stable DMG
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Normalize release version
        id: normalized
        run: |
          eval "$(bash scripts/normalize-release-version.sh "${GITHUB_REF#refs/tags/}")"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_version=$SHORT_VERSION" >> "$GITHUB_OUTPUT"
          echo "bundle_version=$BUNDLE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Normalized version: $DISPLAY_VERSION ($BUNDLE_VERSION)"

      - name: Resolve package dependencies
        run: |
          mkdir -p build
          xcodebuild -resolvePackageDependencies \
            -project rcmm.xcodeproj \
            -scheme rcmm \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -clonedSourcePackagesDirPath build/SourcePackages

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build stable DMG without notarization
        run: |
          bash scripts/build-release-dmg.sh --unsigned "${{ steps.normalized.outputs.display_version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dmg="dist/rcmm-${{ steps.normalized.outputs.display_version }}.dmg"
          checksum="$dmg.sha256"

          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" "$dmg" "$checksum" --clobber
          else
            gh release create "${{ github.ref_name }}" "$dmg" "$checksum" \
              --title "rcmm ${{ steps.normalized.outputs.display_version }}" \
              --generate-notes
          fi

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stable-build-logs
          path: |
            build/
            dist/
          retention-days: 7
